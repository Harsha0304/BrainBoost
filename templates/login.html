{% extends 'base.html' %}
{% block auth_content %}
<div class="auth-card">
    <div class="auth-logo">
        <div class="logo-icon">🧠</div>
        <div class="logo-name">BrainBoost</div>
    </div>
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Sign in to continue your learning journey</p>

    {% if form.errors %}
    <div class="alert alert-danger text-center py-2 mb-3" style="font-size:.83rem;">
        <i class="bi bi-exclamation-circle me-1"></i> Invalid username or password
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Username or Email</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username or email" autofocus required>
        </div>
        <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn btn-primary w-100 py-2">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
    </form>

    <div class="mt-3 d-flex justify-content-between" style="font-size:.83rem;">
        <a href="{% url 'password_reset' %}" class="text-muted">Forgot password?</a>
        <a href="/register/">Create account</a>
    </div>
</div>
{% endblock %}
