{% extends 'base.html' %}
{% block auth_content %}
<div class="auth-card text-center">
    <div style="font-size:3rem;margin-bottom:12px;">✅</div>
    <h2 class="auth-title">Password updated</h2>
    <p class="auth-sub">Your password has been successfully reset. You can now sign in.</p>
    <a href="{% url 'login' %}" class="btn btn-primary w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In Now
    </a>
</div>
{% endblock %}
