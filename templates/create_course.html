{% extends 'base.html' %}
{% block content %}

<h2>Create New Course</h2>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-success">
        ✅ Create Course
    </button>

    <a href="{% url 'courses' %}" class="btn btn-secondary ms-2">
        ⬅ Cancel
    </a>
</form>

{% endblock %}
