{% extends 'base.html' %}
{% block auth_content %}
<div class="auth-card">
    <div class="auth-logo">
        <div class="logo-icon">✉️</div>
        <div class="logo-name">BrainBoost</div>
    </div>
    <h2 class="auth-title">Verify your email</h2>
    <p class="auth-sub">We sent a 6-digit OTP to your registered email address</p>

    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} py-2 mb-3" style="font-size:.83rem;">{{ message }}</div>
    {% endfor %}
    {% endif %}

    <form method="post" novalidate>
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Registered Email</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="mb-4">
            <label class="form-label">OTP Code</label>
            <input type="text" name="otp" class="form-control text-center fw-bold" placeholder="● ● ● ● ● ●" maxlength="6" required style="letter-spacing:6px;font-size:1.2rem;">
        </div>
        <button type="submit" class="btn btn-success w-100 py-2">
            <i class="bi bi-shield-check me-2"></i>Verify Email
        </button>
    </form>

    <div class="text-center mt-3" style="font-size:.82rem;">
        <span class="text-muted">Didn't receive the OTP?</span>
        <a href="{% url 'verify_email' %}" class="ms-1">Resend</a>
    </div>
</div>
{% endblock %}
