{% extends 'base.html' %}
{% block auth_content %}
<div class="auth-card text-center">
    <div style="font-size:3rem;margin-bottom:12px;">📧</div>
    <h2 class="auth-title">Email sent!</h2>
    <p class="auth-sub">We've sent a reset link to your inbox. Check your spam folder if you don't see it.</p>
    <a href="{% url 'login' %}" class="btn btn-primary w-100 py-2">Back to Login</a>
</div>
{% endblock %}
