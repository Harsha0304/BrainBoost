{% extends 'base.html' %}
{% block auth_content %}
<div class="auth-card">
    <div class="auth-logo">
        <div class="logo-icon">🔑</div>
        <div class="logo-name">BrainBoost</div>
    </div>
    <h2 class="auth-title">Set new password</h2>
    <p class="auth-sub">Choose a strong password for your account</p>
    {% if form.errors %}
    <div class="alert alert-danger py-2 mb-3" style="font-size:.83rem;">
        {% for field in form %}{% for error in field.errors %}<div>{{ error }}</div>{% endfor %}{% endfor %}
    </div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="new_password1" class="form-control" placeholder="Enter new password" required>
        </div>
        <div class="mb-4">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="new_password2" class="form-control" placeholder="Confirm new password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">
            <i class="bi bi-lock-fill me-2"></i>Reset Password
        </button>
    </form>
</div>
{% endblock %}
